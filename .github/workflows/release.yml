name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "0.1.0"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Test
        run: dotnet test .\AthenaCompanion.sln --configuration Release

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: |
          .\scripts\build-release.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -InnoSetupPath "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AthenaCompanionSetup-${{ steps.version.outputs.version }}
          path: artifacts/installer/*.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/installer/*.exe
          generate_release_notes: true
